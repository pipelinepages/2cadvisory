<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2C Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-0: #070f1c;
            --bg-1: #0c1728;
            --bg-2: #12213a;
            --card: #101d33;
            --card-border: #22314a;
            --ink-0: #eef2f7;
            --ink-1: #aab6c8;
            --ink-2: #7e8ba0;
            --accent: #5eead4;
            --accent-2: #34d399;
            --accent-soft: rgba(94, 234, 212, 0.12);
            --amber: #f0b84f;
            --radius: 14px;
            --maxw: 1180px;
            --nav-height: 72px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: var(--nav-height);
        }

        body {
            margin: 0;
            background: var(--bg-0);
            color: var(--ink-0);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        .display {
            font-family: 'Sora', sans-serif;
            letter-spacing: -0.02em;
            margin: 0;
        }
        h4 {
            font-family: 'Sora', sans-serif;
            letter-spacing: -0.01em;
            margin: 0;
            color: var(--ink-0);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            display: block;
            height: auto;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .wrap {
            max-width: var(--maxw);
            margin: 0 auto;
            padding: 0 32px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
        }
        .eyebrow::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 13px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            text-align: center;
            justify-content: center;
            min-height: 46px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #04120f;
            border: 1px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px -8px rgba(94, 234, 212, 0.55);
        }
        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px -4px rgba(94, 234, 212, 0.4);
        }
        .btn-ghost {
            border-color: var(--card-border);
            color: var(--ink-0);
            background: transparent;
        }
        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-sm {
            padding: 10px 18px;
            font-size: 13px;
            min-height: 40px;
        }

        /* ── Header ─────────────────────── */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(7, 15, 28, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            min-height: var(--nav-height);
        }
        nav.wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            padding-bottom: 14px;
            position: relative;
            z-index: 51;
        }
        .logo {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
        .logo img {
            height: 50px;
            width: auto;
            display: block;
        }
        footer .logo img {
            height: 64px;
        }

        .navlinks {
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 14px;
            color: var(--ink-1);
        }
        .navlinks a {
            transition: color .15s ease;
            white-space: nowrap;
        }
        .navlinks a:hover {
            color: var(--ink-0);
        }
        .navlinks .has-caret {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: default;
            white-space: nowrap;
        }
        .caret {
            width: 8px;
            height: 8px;
            border-right: 1.5px solid currentColor;
            border-bottom: 1.5px solid currentColor;
            transform: rotate(45deg);
            margin-top: -3px;
            flex-shrink: 0;
        }
        .navactions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        /* Burger */
        .burger {
            display: none;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: transparent;
            flex-shrink: 0;
            transition: border-color .2s ease;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }
        .burger:hover {
            border-color: var(--accent);
        }
        .burger span,
        .burger span::before,
        .burger span::after {
            content: '';
            display: block;
            width: 18px;
            height: 2px;
            background: var(--ink-0);
            position: relative;
            transition: transform .25s ease, top .25s ease, background .25s ease;
            border-radius: 1px;
        }
        .burger span::before {
            position: absolute;
            top: -6px;
        }
        .burger span::after {
            position: absolute;
            top: 6px;
        }
        .burger.active span {
            background: transparent;
        }
        .burger.active span::before {
            top: 0;
            transform: rotate(45deg);
        }
        .burger.active span::after {
            top: 0;
            transform: rotate(-45deg);
        }

        /* Mobile nav overlay */
        .nav-overlay {
            display: none;
            position: fixed;
            inset: 0;
            top: var(--nav-height);
            background: rgba(0, 0, 0, 0.5);
            z-index: 48;
            opacity: 0;
            transition: opacity .3s ease;
            pointer-events: none;
        }
        .nav-overlay.active {
            display: block;
            opacity: 1;
            pointer-events: auto;
        }

        /* ── Hero ──────────────────────── */
        .hero {
            position: relative;
            overflow: hidden;
            padding: 96px 0 80px;
            background:
                radial-gradient(ellipse 900px 500px at 85% 20%, rgba(94, 234, 212, 0.10), transparent 60%),
                linear-gradient(180deg, var(--bg-0), var(--bg-1));
        }
        .skyline {
            position: absolute;
            right: -40px;
            bottom: 0;
            width: 55%;
            max-width: 700px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 1;
        }
        .hero .wrap {
            position: relative;
            z-index: 2;
        }
        .hero-inner {
            max-width: 640px;
        }
        .hero h1 {
            font-size: clamp(34px, 5vw, 52px);
            font-weight: 700;
            line-height: 1.12;
            margin-top: 18px;
        }
        .hero h1 .accent-line {
            color: var(--accent);
            display: block;
        }
        .hero p.lead {
            color: var(--ink-1);
            font-size: clamp(15px, 1.8vw, 16px);
            max-width: 520px;
            margin: 22px 0 32px;
        }
        .hero-ctas {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        /* Trustbar */
        .trustbar {
            padding: 32px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            background: var(--bg-1);
        }
        .trustbar .label {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-2);
            margin-bottom: 16px;
        }
        .logos {
            display: flex;
            align-items: center;
            gap: 36px;
            flex-wrap: wrap;
            color: var(--ink-1);
            font-weight: 600;
            font-size: 15px;
            opacity: 0.8;
        }
        .logos span {
            white-space: nowrap;
        }

        /* ── Sections ──────────────────── */
        section {
            padding: 80px 0;
        }
        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .section-head h2 {
            font-size: clamp(26px, 3.5vw, 32px);
            font-weight: 700;
            line-height: 1.25;
        }
        .section-head h2 .accent {
            color: var(--accent);
        }
        .section-head .view-all {
            font-size: 14px;
            color: var(--accent);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .section-head .view-all:hover {
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .section-head p.sub {
            color: var(--ink-1);
            max-width: 520px;
            margin-top: 12px;
        }

        /* ── Practice Areas ────────────── */
        .practice-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--card-border);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .practice-card {
            background: var(--card);
            padding: 28px 24px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background .2s ease;
            cursor: default;
        }
        .practice-card:hover {
            background: var(--bg-2);
        }
        .practice-card .number {
            font-family: 'Sora', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .practice-card h3 {
            font-size: clamp(17px, 1.8vw, 20px);
            font-weight: 600;
            line-height: 1.3;
            font-family: 'Sora', sans-serif;
        }
        .practice-card p {
            font-size: 14px;
            color: var(--ink-1);
            margin: 0;
            line-height: 1.5;
        }

        /* ── Approach Table ────────────── */
        .approach {
            background: var(--bg-0);
            overflow: hidden;
            position: relative;
        }
        .approach .section-head {
            margin-bottom: 16px;
        }
        .approach-table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .approach-table {
            display: grid;
            grid-template-columns: 1.2fr 1.8fr 2fr;
            gap: 0;
            min-width: 600px;
        }
        .approach-table .col-head {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-2);
            padding: 20px 16px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--bg-1);
        }
        .approach-table .col-head:first-child {
            padding-left: 20px;
        }
        .approach-table .row-item {
            display: flex;
            align-items: center;
            padding: 16px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 14.5px;
            min-height: 52px;
        }
        .approach-table .row-item:last-child {
            border-bottom: none;
        }
        .approach-table .row-item.label {
            color: var(--ink-1);
            font-weight: 400;
            padding-left: 20px;
        }
        .approach-table .row-item.col-2 {
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--ink-1);
        }
        .approach-table .row-item.col-3 {
            border-left: 1px solid var(--accent);
            color: var(--ink-0);
            padding-left: 20px;
            font-weight: 500;
        }

        /* ── Founder ───────────────────── */
        .founder {
            background: var(--bg-1);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .founder-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 48px;
            align-items: start;
        }
        .founder-img-placeholder {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            aspect-ratio: 3 / 4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-2);
            font-size: 14px;
            text-align: center;
            padding: 20px;
            min-height: 360px;
            position: sticky;
            top: calc(var(--nav-height) + 24px);
        }
        .founder-content {
            padding-top: 4px;
        }
        .founder-content .eyebrow {
            margin-bottom: 16px;
        }
        .founder-content blockquote {
            margin: 0 0 24px 0;
            font-family: 'Sora', sans-serif;
            font-size: clamp(20px, 2.8vw, 26px);
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.02em;
            color: var(--ink-0);
        }
        .founder-content .attribution {
            color: var(--ink-1);
            font-size: 14.5px;
            margin-bottom: 32px;
        }
        .founder-credential-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 100%;
        }
        .credential-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
            gap: 12px;
        }
        .credential-row:first-child {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .credential-row .label {
            color: var(--ink-1);
            flex-shrink: 0;
        }
        .credential-row .value {
            color: var(--ink-0);
            text-align: right;
        }

        /* ── Blueprint ─────────────────── */
        .blueprint {
            background: var(--bg-0);
        }
        .blueprint-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }
        .blueprint-left h2 {
            font-size: clamp(28px, 3.5vw, 38px);
            font-weight: 700;
            line-height: 1.2;
            margin: 16px 0 24px 0;
        }
        .blueprint-left p {
            color: var(--ink-1);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 32px;
            max-width: 520px;
        }
        .blueprint-actions {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .blueprint-actions .btn {
            min-width: 150px;
            justify-content: center;
        }
        .blueprint-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding-top: 8px;
        }
        .blueprint-list li {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            color: var(--ink-1);
            font-size: 15px;
        }
        .blueprint-list li::before {
            content: '';
            display: block;
            width: 14px;
            height: 2px;
            background: var(--accent);
            margin-top: 10px;
            flex-shrink: 0;
            border-radius: 1px;
        }

        /* ── Legal Health Check ─────────── */
        .assess {
            background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
        }
        .assess-grid {
            display: grid;
            grid-template-columns: 0.82fr 1.18fr;
            gap: 48px;
            align-items: center;
        }
        .assess-copy h2 {
            font-size: clamp(26px, 3.5vw, 36px);
            font-weight: 700;
            line-height: 1.22;
            margin: 14px 0 16px;
        }
        .assess-copy p {
            color: var(--ink-1);
            margin: 0 0 22px;
            font-size: 15px;
            line-height: 1.7;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0 0 28px;
            display: flex;
            flex-direction: column;
            gap: 11px;
        }
        .checklist li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14.5px;
            color: var(--ink-0);
        }
        .checklist .tick {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex: none;
            font-weight: 700;
            margin-top: 1px;
        }
        .assess-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .fineprint
