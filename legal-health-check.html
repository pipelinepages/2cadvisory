<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Legal Health Check | 2C Legal Advisory</title>
<style>
:root{--teal:#1A6B72;--teal-dark:#134f54;--gold:#C8965A;--bg:#EEF5F5;--line:#C8E3E5;--green:#22a85a;--amber:#d4a017;--red:#e0433a}
*{box-sizing:border-box} body{margin:0;font-family:"DM Sans","Segoe UI",sans-serif;background:var(--bg);color:#1a1a1a} button,input{font:inherit} button{cursor:pointer} .page{min-height:100vh;padding:24px 16px} .card{background:#fff;border-radius:20px;box-shadow:0 4px 32px rgba(26,107,114,.10);padding:32px;max-width:700px;margin:0 auto} .center{text-align:center}
.logo{width:140px;height:auto;display:block;margin:0 auto 20px} h1{font-size:32px;font-weight:800;color:var(--teal);margin:0 0 6px;line-height:1.1} .lead{color:#4A7A7D;font-size:16px;margin:0 0 24px;line-height:1.6}
.flex{display:flex} .wrap{flex-wrap:wrap} .gap8{gap:8px} .gap10{gap:10px} .gap12{gap:12px} .chip{background:#F0F7F8;color:var(--teal);border:1.5px solid var(--line);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600} .chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn{border:none;border-radius:11px;padding:11px 26px;font-weight:700;font-size:15px;background:var(--teal);color:#fff} .btn.secondary{background:#F0F7F8;color:var(--teal);border:1.5px solid var(--line)} .btn.gold{background:var(--gold)} .btn.flex1{flex:1} .info{background:#F4FAF9;border-radius:14px;padding:20px 24px;margin-bottom:28px;text-align:left} .info-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px} .muted{color:#888} .tiny{font-size:12px;color:#aaa} .eyebrow{font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:10px}
label{font-weight:700;font-size:14px;color:var(--teal);display:block;margin-bottom:7px} input{border:1.5px solid var(--line);border-radius:10px;padding:11px 14px;font-size:15px;width:100%;outline:none;color:#1a1a1a} .stack{display:flex;flex-direction:column;gap:18px} .actions{display:flex;gap:12px;margin-top:28px}
.header{background:linear-gradient(135deg,var(--teal),var(--teal-dark));border-radius:14px;padding:22px 24px;color:#fff;margin-bottom:24px} .header h2{margin:0 0 4px;font-size:22px} .progress-wrap{max-width:700px;margin:0 auto 18px} .progress-meta{display:flex;justify-content:space-between;font-size:13px;color:#5A7A7D;margin-bottom:6px} .track{background:var(--line);border-radius:99px;height:6px} .fill{background:var(--teal);height:6px;border-radius:99px;transition:width .35s}
.question,.reg-row{border:1px solid #E0EEF0;border-radius:12px;padding:16px;margin-bottom:10px} .question:nth-child(even),.reg-row.alt{background:#F4FAF9} .q-title{font-weight:700;font-size:15px;margin:0 0 4px} .q-detail{color:#888;font-size:13px;margin:0 0 12px;font-style:italic;line-height:1.5} .status{background:#F0F7F8;color:#555;border:1.5px solid var(--line);border-radius:8px;padding:7px 15px;font-size:13px;font-weight:600} .status[data-status="done"].active{background:var(--green);border-color:var(--green);color:#fff} .status[data-status="in_progress"].active{background:var(--amber);border-color:var(--amber);color:#fff} .status[data-status="not_yet"].active{background:var(--red);border-color:var(--red);color:#fff} .status[data-status="na"].active{background:#999;border-color:#999;color:#fff}
.warning{background:#FFF5F5;border:1.5px solid #f5c6c6;border-radius:10px;padding:14px 18px;font-size:14px;color:#c0392b;margin-bottom:20px;line-height:1.6} .part-title{font-weight:800;color:var(--teal);margin:20px 0 12px;font-size:15px} .reg-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap} .reg-copy{flex:1;min-width:180px} .reg-name{font-weight:700;color:var(--teal);font-size:14px} .reg-why{color:#999;font-size:12px;margin-top:3px;font-style:italic;line-height:1.4}
.score-circle{width:130px;height:130px;border-radius:50%;border:8px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px} .pill{border-radius:99px;padding:6px 22px;font-size:15px;font-weight:700;display:inline-block} .section-row{display:flex;align-items:center;gap:12px;margin-bottom:10px} .section-bar{flex:1} .bar-label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:5px} .small-track{background:#E0EEF0;border-radius:99px;height:7px} .small-fill{height:7px;border-radius:99px} .issue{border-radius:10px;padding:11px 14px;margin-bottom:8px} .issue.red{background:#FFF5F5;border:1px solid #f5c6c6} .issue.green{background:#F0FBF4;border:1px solid #b7e5c7} .premium-cta{background:linear-gradient(135deg,var(--teal),#0d4347);border-radius:16px;padding:24px;color:#fff;text-align:center} .report{background:#F4FAF9;border-radius:12px;padding:24px;line-height:1.75;font-size:15px;margin-bottom:24px} .report h2{color:var(--teal);font-size:20px;margin:22px 0 8px} .callout{background:#FDF3E7;border:2px solid var(--gold);border-radius:14px;padding:22px 24px;text-align:center} .linkbtn{display:inline-block;text-decoration:none}
@media(max-width:560px){.card{padding:22px 18px} h1{font-size:28px} .actions{flex-direction:column} .btn{width:100%} .reg-top{display:block} .reg-top .flex{margin-top:10px}}

/* Dark / night mode */
:root{
  --teal:#5eead4;
  --teal-dark:#0f766e;
  --gold:#e8b976;
  --bg:#070f1c;
  --line:#26364f;
  --green:#34d399;
  --amber:#f0b84f;
  --red:#fb7185;
  --surface:#101d33;
  --surface-2:#12213a;
  --surface-3:#0c1728;
  --text:#eef2f7;
  --muted:#aab6c8;
}
body{background:var(--bg);color:var(--text)}
.page{background:radial-gradient(ellipse 760px 420px at 50% 0%,rgba(94,234,212,.08),transparent 65%),var(--bg)}
.card{background:var(--surface);border:1px solid var(--line);box-shadow:0 18px 50px rgba(0,0,0,.32)}
h1,label,.reg-name,.part-title,.report h2{color:var(--teal)}
.lead,.muted,.progress-meta{color:var(--muted)}
.tiny{color:#7e8ba0}
.info,.question:nth-child(even),.reg-row.alt,.report{background:var(--surface-2)}
.question,.reg-row{border-color:var(--line)}
.chip,.btn.secondary,.status{background:var(--surface-2);color:var(--text);border-color:var(--line)}
.chip:hover,.btn.secondary:hover,.status:hover{border-color:var(--teal);color:var(--teal)}
.chip.active{background:var(--teal-dark);color:#fff;border-color:var(--teal)}
.btn{background:linear-gradient(135deg,var(--teal),#34d399);color:#04120f}
.btn.gold{background:var(--gold);color:#17110a}
input{background:var(--surface-3);border-color:var(--line);color:var(--text)}
input::placeholder{color:#6f7f96}
input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(94,234,212,.10)}
.header,.premium-cta{background:linear-gradient(135deg,#0f766e,#0a3d42)}
.track,.small-track{background:#24344d}
.q-detail,.reg-why{color:#8f9caf}
.q-title{color:var(--text)}
.question{background:var(--surface-3)}
.question.alt{background:var(--surface-2)}
.reg-full{color:var(--muted);font-size:13px}
.warning{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.35);color:#fda4af}
.issue.red{background:rgba(251,113,133,.10);border-color:rgba(251,113,133,.32)}
.issue.green{background:rgba(52,211,153,.10);border-color:rgba(52,211,153,.30)}
.callout{background:rgba(232,185,118,.10);border-color:var(--gold)}
.score-circle{background:var(--surface-3)}

.report-logo-wrap{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  margin-bottom:12px;
  background:#ffffff;
  border:1px solid rgba(255,255,255,.22);
  border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.24);
}
.report-logo-wrap img{
  width:90px;
  height:auto;
  display:block;
  margin:0;
}
.callout p{color:var(--muted)!important}


</style>

    { id: "pcidss", name: "PCI-DSS",full: "Card Payment Compliance Standard",            why: "Required if your app processes, stores, or transmits card data." },
  ],
  healthtech: [
    { id: "nhia",   name: "NHIA",    full: "Nat. Health Insurance Authority",             why: "Required for digital health coverage or insurance-linked health products." },
    { id: "nafdac", name: "NAFDAC", full: "Nat. Agency for Food & Drug Admin.",          why: "Required for apps involving drugs, supplements, or medical devices." },
    { id: "fccpc",  name: "FCCPC",  full: "Fed. Competition & Consumer Protection",       why: "Governs consumer health products." },
  ],
  edtech:     [
    { id: "fccpc",  name: "FCCPC",  full: "Fed. Competition & Consumer Protection",       why: "Consumer protection for student and parent-facing products." },
    { id: "nitda2", name: "NITDA",  full: "EdTech Regulation",                            why: "NITDA is developing frameworks specifically for digital education platforms." },
  ],
  telecom:    [
    { id: "ncc",    name: "NCC",     full: "Nat. Communications Commission",              why: "Required for VoIP, messaging infrastructure, or MVNO services." },
  ],
  media:      [
    { id: "nbc",    name: "NBC",     full: "Nat. Broadcasting Commission",                why: "Required for streaming, audio/video content, or broadcast services." },

  ],
  insurtech:  [
    { id: "naicom", name: "NAICOM", full: "Nat. Insurance Commission",                   why: "Required for underwriting, distributing, or facilitating insurance products." },
    { id: "fccpc",  name: "FCCPC",  full: "Fed. Competition & Consumer Protection",       why: "Governs consumer-facing insurance products." },
  ],
  general:    [
    { id: "fccpc",  name: "FCCPC",  full: "Fed. Competition & Consumer Protection",       why: "Governs all consumer-facing digital products regardless of sector." },

};

const SECTORS = [
  { id: "fintech",    label: "Fintech / Payments" },
  { id: "healthtech", label: "Healthtech" },
  { id: "edtech",     label: "Edtech" },
  { id: "telecom",    label: "Telecom / Messaging" },
  { id: "media",      label: "Media / Entertainment" },
  { id: "insurtech",  label: "Insurtech" },
  { id: "general",    label: "General / Other" },
];

const STAGES = ["Idea", "MVP", "Pre-launch", "Live", "Growing"];

const STATUS_OPTIONS = [
  { id: "done",        label: "Done",        color: "#22a85a", light: "#edf9f1" },
  { id: "in_progress", label: "In Progress", color: "#d4a017", light: "#fdf8ec" },
  { id: "not_yet",     label: "Not Yet",     color: "#e0433a", light: "#fef2f2" },
  { id: "na",          label: "N/A",         color: "#999",    light: "#f5f5f5" },
];

function calcScore(answers, regAnswers, sections, sectorRegs) {
  let total = 0, count = 0, issues = [], inProgress = [];
  sections.filter(s => !s.special).forEach(s => {
    s.items.forEach(item => {
      const a = answers[item.id];
      if (!a || a === "na") return;
      count++;
      if (a === "done") total += 100;
      else if (a === "in_progress") { total += 50; inProgress.push({ ...item, section: s.title }); }
      else issues.push({ ...item, section: s.title });
    });
  });
  const pct = count > 0 ? Math.round(total / count) : 0;
  return {
    score: pct,
    issues,
    inProgress,
    risk: count === 0 ? "Unknown" : pct >= 70 ? "Low" : pct >= 40 ? "Medium" : "High",
  };
}


const state={screen:'welcome',market:'nigeria',intake:{name:'',company:'',sector:'general',stage:'MVP'},answers:{},regAnswers:{},sectionIdx:0};
const app=document.getElementById('app');
const sectorRegs=()=>SECTOR_REGS[state.intake.sector]||SECTOR_REGS.general;
const sectorLabel=()=>SECTORS.find(s=>s.id===state.intake.sector)?.label||'General / Other';
function results(){return calcScore(state.answers,state.regAnswers,SECTIONS,sectorRegs())}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function go(screen){state.screen=screen;render();scrollTo(0,0)}
function statusButtons(value,key,type='answer'){return `<div class="flex wrap gap8">${STATUS_OPTIONS.map(s=>`<button class="status ${value===s.id?'active':''}" data-status="${s.id}" onclick="setStatus('${type}','${key}','${s.id}')">${s.label}</button>`).join('')}</div>`}
window.setStatus=(type,key,val)=>{(type==='reg'?state.regAnswers:state.answers)[key]=val;render()};
window.selectMarket=id=>{state.market=id;render()}; window.setSector=id=>{state.intake.sector=id;render()}; window.setStage=id=>{state.intake.stage=id;render()};
function shell(content){app.innerHTML=`<div class="page">${content}</div>`}
function welcome(){shell(`<div class="card center"><img src="${LOGO}" class="logo" alt="2C Legal Advisory"><h1>Free Legal Health Check</h1><p class="lead">Find out exactly where your startup stands legally — and what to fix first.</p><div class="flex wrap gap10" style="justify-content:center;margin-bottom:28px"><button class="chip ${state.market==='nigeria'?'active':''}" onclick="selectMarket('nigeria')">🇳🇬 Nigeria</button><button class="chip ${state.market==='global'?'active':''}" onclick="selectMarket('global')">🌍 Global</button></div><div class="info"><div class="info-row"><span>✅</span><div><strong style="color:var(--teal)">Free tier</strong><br><span class="tiny">Complete all sections, get your risk score & top issues</span></div></div><div class="info-row"><span>🤖</span><div><strong style="color:var(--teal)">Personalised report</strong><br><span class="tiny">Instant section-by-section report + priority action plan</span></div></div><div class="info-row"><span>⏱️</span><div><strong style="color:var(--teal)">~15 minutes</strong><br><span class="tiny">Plain English — no legal background needed</span></div></div></div><button class="btn" style="font-size:16px;padding:14px 44px" onclick="go('intake')">Start Free Check →</button><div class="tiny" style="margin-top:16px">No sign-up required · Completely confidential</div></div>`)}
function intake(){shell(`<div class="card"><div class="eyebrow">Step 1 of 2</div><h2 style="color:var(--teal);margin:0 0 4px">About Your Startup</h2><p class="muted" style="font-size:14px;margin:0 0 24px">This personalises your results. Takes 1 minute.</p><div class="stack"><div><label>Your Name</label><input id="name" placeholder="e.g. Amaka Obi" value="${esc(state.intake.name)}"></div><div><label>Company / App Name</label><input id="company" placeholder="Enter your company or app name" value="${esc(state.intake.company)}"></div><div><label>Sector</label><div class="flex wrap gap8">${SECTORS.map(s=>`<button class="chip ${state.intake.sector===s.id?'active':''}" onclick="setSector('${s.id}')">${s.label}</button>`).join('')}</div></div><div><label>Stage</label><div class="flex wrap gap8">${STAGES.map(s=>`<button class="chip ${state.intake.stage===s?'active':''}" onclick="setStage('${s}')">${s}</button>`).join('')}</div></div></div><div class="actions"><button class="btn secondary" onclick="go('welcome')">← Back</button><button class="btn flex1" onclick="startAssessment()">Begin Assessment →</button></div></div>`); document.getElementById('name').oninput=e=>state.intake.name=e.target.value;document.getElementById('company').oninput=e=>state.intake.company=e.target.value}
window.startAssessment=()=>{state.sectionIdx=0;go('assessment')};
function regRow(reg,i){return `<div class="reg-row ${i%2?'alt':''}"><div class="reg-top"><div class="reg-copy"><span class="reg-name">${reg.name}</span><span class="reg-full"> — ${reg.full}</span><div class="reg-why">${reg.why}</div></div>${statusButtons(state.regAnswers[reg.id],reg.id,'reg')}</div></div>`}
function assessment(){const sec=SECTIONS[state.sectionIdx],progress=Math.round(state.sectionIdx/SECTIONS.length*100),last=state.sectionIdx===SECTIONS.length-1;let body='';if(sec.special){body=`<div class="warning"><strong>⚠️ Important:</strong> Complete your general registrations <em>before</em> applying for any sector-specific licence.</div><div class="part-title">Part 1 — General Registrations <span class="muted" style="font-weight:400;font-size:13px">(every app business needs these)</span></div>${GENERAL_REGS.map(regRow).join('')}<div class="part-title">Part 2 — ${sectorLabel()} Regulators <span class="muted" style="font-weight:400;font-size:13px">(tick what applies)</span></div>${sectorRegs().map(regRow).join('')}`}else{body=sec.items.map((item,i)=>`<div class="question ${i%2?'alt':''}"><p class="q-title">${item.label}</p><p class="q-detail">${item.detail}</p>${statusButtons(state.answers[item.id],item.id)}</div>`).join('')}shell(`<div class="progress-wrap"><div class="progress-meta"><strong>Section ${state.sectionIdx+1} of ${SECTIONS.length}</strong><span>${progress}% complete</span></div><div class="track"><div class="fill" style="width:${progress}%"></div></div></div><div class="card"><div class="header"><div style="font-size:30px">${sec.icon}</div><div style="font-size:11px;letter-spacing:2px;opacity:.65;text-transform:uppercase">Section ${sec.code}</div><h2>${sec.title}</h2><p style="margin:0;opacity:.8;font-size:14px">${sec.subtitle}</p></div>${body}<div class="actions"><button class="btn secondary" onclick="prevSection()">← Back</button><button class="btn flex1" onclick="nextSection()">${last?'See My Results →':'Next Section →'}</button></div></div>` )}
window.prevSection=()=>{if(state.sectionIdx>0)state.sectionIdx--;else state.screen='intake';render();scrollTo(0,0)};window.nextSection=()=>{if(state.sectionIdx===SECTIONS.length-1)state.screen='results';else state.sectionIdx++;render();scrollTo(0,0)};
function resultsScreen(){const r=results(),riskColor=r.risk==='Low'?'#22a85a':r.risk==='Medium'?'#d4a017':'#e0433a',riskBg=r.risk==='Low'?'#edf9f1':r.risk==='Medium'?'#fdf8ec':'#fef2f2';const bars=SECTIONS.filter(s=>!s.special).map(sec=>{const done=sec.items.filter(i=>state.answers[i.id]==='done').length,eli=sec.items.filter(i=>state.answers[i.id]&&state.answers[i.id]!=='na').length,pct=eli?Math.round(done/eli*100):0,c=pct>=70?'#22a85a':pct>=40?'#d4a017':'#e0433a';return `<div class="section-row"><span style="font-size:18px;width:26px">${sec.icon}</span><div class="section-bar"><div class="bar-label"><span>${sec.title}</span><span style="color:${c}">${eli?pct+'%':'—'}</span></div><div class="small-track"><div class="small-fill" style="width:${pct}%;background:${c}"></div></div></div></div>`}).join('');const issues=r.issues.slice(0,3).map(i=>`<div class="issue red"><strong style="color:#c0392b">${i.label}</strong><div class="tiny">${i.section}</div></div>`).join('');const progress=r.inProgress.slice(0,3).map(i=>`<div class="issue green"><strong style="color:#1a7a3a">${i.label}</strong><div class="tiny">${i.section}</div></div>`).join('');shell(`<div class="card"><div class="center" style="margin-bottom:28px"><div class="eyebrow">Your Legal Health Score</div><div class="score-circle" style="border-color:${riskColor};background:${riskBg}"><div style="font-size:36px;font-weight:900;color:${riskColor}">${r.score}%</div><div class="tiny">cleared</div></div><span class="pill" style="background:${riskBg};color:${riskColor}">${r.risk} Risk</span><p class="tiny">${esc(state.intake.company||'Your startup')} · ${sectorLabel()} · ${state.intake.stage}</p></div><div style="margin-bottom:24px"><p class="part-title">Section Breakdown</p>${bars}</div>${issues?`<div style="margin-bottom:20px"><p style="font-weight:800;color:#c0392b">🚨 Top Issues to Address</p>${issues}</div>`:''}${progress?`<div style="margin-bottom:24px"><p style="font-weight:800;color:#22a85a">⚡ In Progress — Keep Going</p>${progress}</div>`:''}<div class="premium-cta"><div class="eyebrow">Personalised Report</div><h3 style="margin:0 0 10px">Get Your Full Legal Health Report</h3><p style="opacity:.85;line-height:1.6">A detailed section-by-section analysis, priority action plan, quick wins and Nigerian compliance notes.</p><button class="btn gold" onclick="go('premium')">Generate My Report →</button></div><div class="center" style="margin-top:14px"><button style="border:0;background:none;color:#aaa;text-decoration:underline" onclick="state.sectionIdx=0;go('assessment')">← Edit my answers</button></div></div>`)}
function makeReport(){const r=results(),company=esc(state.intake.company||'Your startup'),name=esc(state.intake.name||'Founder');const critical=r.issues.slice(0,4),good=[];SECTIONS.filter(s=>!s.special).forEach(s=>{const d=s.items.filter(i=>state.answers[i.id]==='done').length;if(d)good.push(`${s.title}: ${d} item${d===1?'':'s'} completed`)});const actions=[...r.issues,...r.inProgress].slice(0,7);const regs=[...GENERAL_REGS,...sectorRegs()].filter(x=>state.regAnswers[x.id]!=='done'&&state.regAnswers[x.id]!=='na').slice(0,5);return `<h2>Executive Summary</h2><p>${name}, ${company} is a ${state.intake.stage.toLowerCase()} ${sectorLabel().toLowerCase()} business with a legal health score of <strong>${r.score}%</strong> and a <strong>${r.risk.toLowerCase()} risk</strong> rating. ${critical.length?`Your biggest exposure is concentrated around ${critical.slice(0,2).map(x=>x.label.toLowerCase()).join(' and ')}.`:'No major unanswered risk was identified from the completed questions.'} This report is a practical screening tool, not formal legal advice.</p><h2>Critical Risks 🚨</h2>${critical.length?`<ul>${critical.map(x=>`<li><strong>${x.label}:</strong> ${x.detail}</li>`).join('')}</ul>`:'<p>No “Not Yet” items were recorded. Review unanswered items before relying on this result.</p>'}<h2>Section-by-Section Analysis</h2><p>${good.length?good.join('. ')+'.':'You have not marked any core legal item as completed yet.'}</p>${SECTIONS.filter(s=>!s.special).map(s=>{const missing=s.items.filter(i=>state.answers[i.id]==='not_yet').length,doing=s.items.filter(i=>state.answers[i.id]==='in_progress').length;return `<p><strong>${s.icon} ${s.title}:</strong> ${missing} urgent gap(s), ${doing} item(s) in progress.</p>`}).join('')}<h2>Priority Action Plan</h2>${actions.length?`<ol>${actions.map((x,i)=>`<li><strong>${x.label}</strong> — ${x.detail} <em>${i<4?'A lawyer should review or prepare this.':'You can begin gathering the documents yourself, then obtain legal review.'}</em></li>`).join('')}</ol>`:'<p>Review every unanswered question and confirm the supporting documents actually exist and are current.</p>'}<h2>Quick Wins ⚡</h2><ol><li>Put every existing agreement, filing and policy into one organised legal folder.</li><li>List every person or vendor who created code, designs, copy or branding for the company.</li><li>Audit the personal data your product collects and delete anything you do not genuinely need.</li></ol><h2>Nigerian Compliance Note</h2><p>Confirm your CAC status and annual returns, tax registrations, privacy documentation and NDPA obligations. ${regs.length?`The registrations requiring attention include: <strong>${regs.map(x=>x.name).join(', ')}</strong>.`:'Your selected regulatory items are marked completed or not applicable.'} Sector licences depend on the exact activities your product performs, so do not assume a licence is unnecessary based only on your company description.</p>`}
function premium(){const r=results(),riskColor=r.risk==='Low'?'#22a85a':r.risk==='Medium'?'#d4a017':'#e0433a';shell(`<div class="card"><div class="header"><div class="report-logo-wrap"><img src="${LOGO}" alt="2C Legal Advisory logo"></div><div class="eyebrow">Personalised Report</div><h2>Legal Health Report</h2><p style="opacity:.8">${esc(state.intake.company||'Your Startup')} · ${sectorLabel()} · ${state.intake.stage}</p><span class="pill" style="background:${riskColor}33;border:1px solid ${riskColor}66">${r.score}% · ${r.risk} Risk</span></div><div class="report">${makeReport()}</div><div class="callout"><div style="font-weight:800;color:var(--gold);font-size:17px">📞 Free 15-Minute Review Call</div><p style="color:#555;line-height:1.6">Have questions about your report? Book a free review call with 2C Legal Advisory.</p><a class="btn gold linkbtn" href="mailto:2c.legaladvisory@gmail.com?subject=Legal%20Health%20Check%20%E2%80%94%20Review%20Call">Book My Free Call →</a></div><div class="center" style="margin-top:14px"><button style="border:0;background:none;color:#aaa;text-decoration:underline" onclick="go('results')">← Back to score overview</button></div></div>`)}
function render(){({welcome,intake,assessment,results:resultsScreen,premium}[state.screen]||welcome)()} render();
</script></body></html>
